<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 118">
  <title>Blockchain protocol stack</title>
  <desc>Flow from application through execution, semantic rules, propagation, to consensus.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="920" height="118" fill="#ffffff"/>
  <text x="460" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#334155">Layered model (conceptual)</text>
  <g font-family="sans-serif" font-size="12" font-weight="600" fill="#0f172a">
    <rect x="20" y="36" width="132" height="46" rx="8" fill="url(#boxFill)" stroke="#94a3b8" stroke-width="1.25"/>
    <text x="86" y="64" text-anchor="middle">Application</text>
    <rect x="174" y="36" width="132" height="46" rx="8" fill="url(#boxFill)" stroke="#94a3b8" stroke-width="1.25"/>
    <text x="240" y="64" text-anchor="middle">Execution</text>
    <rect x="328" y="36" width="132" height="46" rx="8" fill="url(#boxFill)" stroke="#94a3b8" stroke-width="1.25"/>
    <text x="394" y="58" text-anchor="middle" font-size="11">Semantic rules</text>
    <rect x="482" y="36" width="132" height="46" rx="8" fill="url(#boxFill)" stroke="#94a3b8" stroke-width="1.25"/>
    <text x="548" y="64" text-anchor="middle">Propagation</text>
    <rect x="636" y="36" width="132" height="46" rx="8" fill="url(#boxFill)" stroke="#64748b" stroke-width="1.5"/>
    <text x="702" y="64" text-anchor="middle">Consensus</text>
  </g>
  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)">
    <line x1="152" y1="59" x2="170" y2="59"/>
    <line x1="306" y1="59" x2="324" y2="59"/>
    <line x1="460" y1="59" x2="478" y2="59"/>
    <line x1="614" y1="59" x2="632" y2="59"/>
  </g>
  <text x="460" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">Data and validity flow left to right toward agreement on chain state</text>
</svg>
