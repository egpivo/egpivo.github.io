<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380"
     font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
  <!-- ==== title bar ==== -->
  <text x="440" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1f2328">
    Two stamps, one mechanism: domain binding via <tspan font-family="ui-monospace, monospace">schema_meta</tspan>
  </text>

  <!-- ==== LEFT CARD: report.json data_source ==== -->
  <!-- card frame -->
  <rect x="20" y="50" width="410" height="240" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <!-- header bar -->
  <rect x="20" y="50" width="410" height="28" rx="6" fill="#f6f8fa"/>
  <rect x="20" y="74" width="410" height="4" fill="#f6f8fa"/>
  <line x1="20" y1="78" x2="430" y2="78" stroke="#d0d7de" stroke-width="1"/>
  <!-- header label -->
  <circle cx="34" cy="64" r="4" fill="#1f7a1f"/>
  <text x="46" y="68" fill="#24292f">report.json</text>
  <text x="420" y="68" text-anchor="end" fill="#6e7781" font-size="11">$ zksp report --format json</text>

  <!-- JSON body (left) -->
  <g fill="#1f2328">
    <text x="36" y="100">{</text>
    <text x="50" y="120"><tspan fill="#0550ae">"data_source"</tspan>: {</text>
    <text x="64" y="138"><tspan fill="#0550ae">"source"</tspan>: <tspan fill="#0a3069">"rpc"</tspan>,</text>
    <text x="64" y="156"><tspan fill="#0550ae">"observes_reads"</tspan>: <tspan fill="#953800">false</tspan>,</text>
    <text x="64" y="174"><tspan fill="#0550ae">"observes_non_transfer_write"</tspan>:</text>
    <text x="172" y="192"><tspan fill="#953800">false</tspan>,</text>
    <text x="64" y="210"><tspan fill="#0550ae">"slot_id_form"</tspan>:</text>
    <text x="78" y="228"><tspan fill="#0a3069">"contract:holder (Transfer-log surrogate)"</tspan></text>
    <text x="50" y="246">},</text>
    <text x="50" y="264"><tspan fill="#0550ae">"eda"</tspan>:     <tspan fill="#6e7781">… 24 KB of EDA stats</tspan></text>
    <text x="50" y="282"><tspan fill="#0550ae">"tiering"</tspan>: <tspan fill="#6e7781">… 5 policies</tspan></text>
    <text x="36" y="300">}</text>
  </g>

  <!-- caption -->
  <text x="225" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1f2328">
    coverage stamp
  </text>
  <text x="225" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">
    what the extractor was able to observe
  </text>
  <text x="225" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6e7781">
    (`reads`, `non-Transfer writes`, `slot_id` form)
  </text>

  <!-- ==== RIGHT CARD: schema_meta.extract_limits ==== -->
  <rect x="450" y="50" width="410" height="240" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="450" y="50" width="410" height="28" rx="6" fill="#f6f8fa"/>
  <rect x="450" y="74" width="410" height="4" fill="#f6f8fa"/>
  <line x1="450" y1="78" x2="860" y2="78" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="464" cy="64" r="4" fill="#1f7a1f"/>
  <text x="476" y="68" fill="#24292f">schema_meta.extract_limits</text>
  <text x="850" y="68" text-anchor="end" fill="#6e7781" font-size="11">stamped at end of extract</text>

  <!-- JSON body (right) -->
  <g fill="#1f2328">
    <text x="466" y="100">{</text>
    <text x="480" y="120"><tspan fill="#0550ae">"source"</tspan>:                   <tspan fill="#0a3069">"rpc"</tspan>,</text>
    <text x="480" y="138"><tspan fill="#0550ae">"max_events_per_block"</tspan>:     <tspan fill="#953800">2200</tspan>,</text>
    <text x="480" y="156"><tspan fill="#0550ae">"max_contracts_per_block"</tspan>:  <tspan fill="#953800">120</tspan>,</text>
    <text x="480" y="174"><tspan fill="#0550ae">"max_slots_per_block"</tspan>:      <tspan fill="#953800">2200</tspan></text>
    <text x="466" y="192">}</text>

    <!-- annotation block: what happens on resume mismatch -->
    <rect x="466" y="210" width="380" height="64" rx="4" fill="#fff7e6" stroke="#f3d19a" stroke-width="1"/>
    <text x="478" y="228" fill="#7a5d00" font-family="system-ui, sans-serif" font-size="12" font-weight="600">on --resume with different limits:</text>
    <text x="478" y="248" fill="#1f2328" font-size="12">extract_limits mismatch on resume:</text>
    <text x="478" y="264" fill="#1f2328" font-size="12">DB stamped {…} vs this run {…}</text>
  </g>

  <!-- caption -->
  <text x="655" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1f2328">
    filtering stamp
  </text>
  <text x="655" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">
    what the extractor chose to exclude
  </text>
  <text x="655" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6e7781">
    (per-block hard limits + fail-closed on mismatch)
  </text>
</svg>
