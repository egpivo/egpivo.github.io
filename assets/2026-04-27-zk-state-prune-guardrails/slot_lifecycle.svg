<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <marker id="timeArr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="36" font-size="17" font-weight="600" fill="#222">Not all state behaves the same.</text>

  <!-- Block time arrow -->
  <text x="694" y="68" text-anchor="end" font-size="11" fill="#888">block time</text>
  <line x1="700" y1="64" x2="830" y2="64" stroke="#aaa" stroke-width="1" marker-end="url(#timeArr)"/>

  <!-- Lane 1: frequent (stays hot) -->
  <text x="180" y="110" text-anchor="end" font-size="12" font-weight="600" fill="#234">frequent</text>
  <text x="180" y="126" text-anchor="end" font-size="11" fill="#666">(stays hot)</text>

  <rect x="200" y="92" width="640" height="40" fill="#d9ebd5" stroke="#8fb784" stroke-width="0.6" rx="3"/>
  <g stroke="#3f7d3a" stroke-width="2.2">
    <line x1="225" y1="94" x2="225" y2="130"/>
    <line x1="252" y1="94" x2="252" y2="130"/>
    <line x1="280" y1="94" x2="280" y2="130"/>
    <line x1="312" y1="94" x2="312" y2="130"/>
    <line x1="350" y1="94" x2="350" y2="130"/>
    <line x1="388" y1="94" x2="388" y2="130"/>
    <line x1="422" y1="94" x2="422" y2="130"/>
    <line x1="460" y1="94" x2="460" y2="130"/>
    <line x1="500" y1="94" x2="500" y2="130"/>
    <line x1="540" y1="94" x2="540" y2="130"/>
    <line x1="575" y1="94" x2="575" y2="130"/>
    <line x1="615" y1="94" x2="615" y2="130"/>
    <line x1="650" y1="94" x2="650" y2="130"/>
    <line x1="690" y1="94" x2="690" y2="130"/>
    <line x1="730" y1="94" x2="730" y2="130"/>
    <line x1="770" y1="94" x2="770" y2="130"/>
    <line x1="810" y1="94" x2="810" y2="130"/>
  </g>

  <!-- Lane 2: idle → cold → reactivation -->
  <text x="180" y="180" text-anchor="end" font-size="12" font-weight="600" fill="#234">idle → cold</text>
  <text x="180" y="196" text-anchor="end" font-size="11" fill="#666">→ reactivation</text>

  <rect x="200" y="162" width="100" height="40" fill="#d9ebd5" stroke="#8fb784" stroke-width="0.6" rx="3"/>
  <rect x="300" y="162" width="540" height="40" fill="#ececec" stroke="#bababa" stroke-width="0.6"/>
  <g stroke="#3f7d3a" stroke-width="2.2">
    <line x1="220" y1="164" x2="220" y2="200"/>
    <line x1="245" y1="164" x2="245" y2="200"/>
    <line x1="278" y1="164" x2="278" y2="200"/>
  </g>
  <text x="780" y="190" text-anchor="middle" font-size="22" fill="#d44">★</text>

  <!-- Lane 3: one-shot (then dead) -->
  <text x="180" y="250" text-anchor="end" font-size="12" font-weight="600" fill="#234">one-shot</text>
  <text x="180" y="266" text-anchor="end" font-size="11" fill="#666">(then dead)</text>

  <rect x="200" y="232" width="38" height="40" fill="#d9ebd5" stroke="#8fb784" stroke-width="0.6" rx="3"/>
  <rect x="238" y="232" width="602" height="40" fill="#ececec" stroke="#bababa" stroke-width="0.6"/>
  <line x1="218" y1="234" x2="218" y2="270" stroke="#3f7d3a" stroke-width="2.2"/>

  <!-- Legend -->
  <g font-size="11" fill="#444">
    <rect x="40" y="312" width="14" height="14" fill="#d9ebd5" stroke="#8fb784" stroke-width="0.6"/>
    <text x="60" y="324">hot (in RAM)</text>

    <rect x="170" y="312" width="14" height="14" fill="#ececec" stroke="#bababa" stroke-width="0.6"/>
    <text x="190" y="324">cold (demoted)</text>

    <line x1="318" y1="310" x2="318" y2="328" stroke="#3f7d3a" stroke-width="2.2"/>
    <text x="328" y="324">access (hot hit)</text>

    <text x="455" y="326" font-size="15" fill="#d44">★</text>
    <text x="468" y="324">reactivation (cold-tier hit)</text>
  </g>
</svg>
