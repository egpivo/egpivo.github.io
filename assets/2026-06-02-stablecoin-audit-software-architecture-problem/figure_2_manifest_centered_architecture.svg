<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img" aria-labelledby="fig2title">
  <title id="fig2title">Manifest-centered evidence architecture</title>
  <rect width="1100" height="420" fill="#f8fafc"/>
  <text x="550" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#0f172a">Manifest-centered evidence architecture</text>

  <text x="148" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0369a1">1. Produce evidence</text>
  <text x="550" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#059669">2. Bind claims</text>
  <text x="920" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#4f46e5">3. Inspect / deliver</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#059669"/>
    </marker>
  </defs>

  <g font-family="system-ui,sans-serif">
    <rect x="48" y="88" width="200" height="56" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text x="148" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Audit Request</text>
    <text x="148" y="130" text-anchor="middle" font-size="10" fill="#475569">asset, chain, window, run_id</text>

    <rect x="48" y="168" width="200" height="56" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="148" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Rust audit workflow</text>
    <text x="148" y="210" text-anchor="middle" font-size="10" fill="#475569">transfer-audit, cross-chain-summary</text>

    <rect x="48" y="248" width="200" height="64" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="148" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Canonical artifacts</text>
    <text x="148" y="288" text-anchor="middle" font-size="10" fill="#475569">transfers, supply snapshots</text>
    <text x="148" y="302" text-anchor="middle" font-size="10" fill="#475569">QA report, execution log</text>
  </g>

  <rect x="390" y="100" width="320" height="200" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <rect x="470" y="82" width="160" height="22" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="550" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#065f46">Product contract</text>
  <text x="550" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">artifact_manifest.json</text>
  <text x="550" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#334155">workflow steps, artifact index</text>
  <text x="550" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#334155">checksums</text>
  <text x="550" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#047857">supported claims</text>
  <text x="550" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#047857">unsupported scope</text>

  <g font-family="system-ui,sans-serif">
    <rect x="820" y="96" width="200" height="64" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="920" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Read-only API</text>
    <text x="920" y="138" text-anchor="middle" font-size="10" fill="#475569">list runs, read manifest</text>
    <text x="920" y="152" text-anchor="middle" font-size="10" fill="#475569">serve artifacts</text>

    <rect x="820" y="176" width="200" height="56" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text x="920" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Evidence Console</text>
    <text x="920" y="218" text-anchor="middle" font-size="10" fill="#475569">summary, claims, logs, artifacts</text>

    <rect x="820" y="248" width="200" height="56" rx="8" fill="#f0fdfa" stroke="#0f766e" stroke-width="2"/>
    <text x="920" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Evidence Bundle</text>
    <text x="920" y="290" text-anchor="middle" font-size="10" fill="#475569">zip, checksum, offline review</text>
  </g>

  <g fill="none" stroke-width="2" marker-end="url(#arr)">
    <path d="M148 144 L148 168" stroke="#64748b"/>
    <path d="M148 224 L148 248" stroke="#64748b"/>
    <path d="M248 280 L390 200" stroke="#059669" marker-end="url(#arrG)"/>
    <path d="M710 180 L820 128" stroke="#059669" marker-end="url(#arrG)"/>
    <path d="M920 160 L920 176" stroke="#64748b"/>
    <path d="M920 232 L920 248" stroke="#64748b"/>
  </g>
  <path d="M550 300 Q550 340 760 340 L920 340 L920 304" fill="none" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arr)"/>

  <text x="550" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-style="italic" fill="#64748b">CLI writes evidence; manifest binds claims; API and UI read the contract</text>
</svg>
