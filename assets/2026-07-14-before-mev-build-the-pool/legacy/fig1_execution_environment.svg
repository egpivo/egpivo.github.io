<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <marker id="ah-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#4C6A91"/>
    </marker>
    <marker id="ah-plum" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8A6799"/>
    </marker>
    <marker id="ah-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8E3B3B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#F7F6F3"/>

  <!-- ── Actor boxes (left column) ────────────────────────────────────── -->

  <!-- LP -->
  <rect x="40" y="60" width="145" height="60" rx="8" ry="8"
        fill="#EAF0F8" stroke="#4C6A91" stroke-width="2"/>
  <text x="112" y="97"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="15" font-weight="bold" fill="#4C6A91" text-anchor="middle">LP</text>

  <!-- Trader -->
  <rect x="40" y="245" width="145" height="60" rx="8" ry="8"
        fill="#EAF0F8" stroke="#4C6A91" stroke-width="2"/>
  <text x="112" y="282"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="15" font-weight="bold" fill="#4C6A91" text-anchor="middle">Trader</text>

  <!-- Arbitrageur -->
  <rect x="40" y="430" width="145" height="60" rx="8" ry="8"
        fill="#F5F0F8" stroke="#8A6799" stroke-width="2"/>
  <text x="112" y="467"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="15" font-weight="bold" fill="#8A6799" text-anchor="middle">Arbitrageur</text>

  <!-- ── AMM Pool (center) ─────────────────────────────────────────────── -->
  <rect x="330" y="185" width="220" height="160" rx="10" ry="10"
        fill="#FEF9EE" stroke="#9A7B45" stroke-width="2.5"/>
  <text x="440" y="224"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="15" font-weight="bold" fill="#9A7B45" text-anchor="middle">AMM Pool</text>
  <text x="440" y="248"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#5F6368" text-anchor="middle">reserve_x · reserve_y ≥ k</text>
  <text x="440" y="266"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#5F6368" text-anchor="middle">fee stays in pool</text>
  <text x="440" y="284"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#5F6368" text-anchor="middle">integer state transition</text>
  <text x="440" y="302"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#5F6368" text-anchor="middle">k non-decreasing</text>

  <!-- ── Right-column boxes ────────────────────────────────────────────── -->

  <!-- External reference price (upper right, dashed) -->
  <rect x="680" y="60" width="175" height="70" rx="8" ry="8"
        fill="#FDF0F0" stroke="#8E3B3B" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="767" y="93"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="13" font-weight="bold" fill="#8E3B3B" text-anchor="middle">External</text>
  <text x="767" y="112"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="13" font-weight="bold" fill="#8E3B3B" text-anchor="middle">reference price</text>

  <!-- LP Position (lower right) -->
  <rect x="680" y="430" width="175" height="60" rx="8" ry="8"
        fill="#EAF0F8" stroke="#4C6A91" stroke-width="2"/>
  <text x="767" y="457"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="13" font-weight="bold" fill="#4C6A91" text-anchor="middle">LP Position</text>
  <text x="767" y="476"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#5F6368" text-anchor="middle">hold comparison</text>

  <!-- ── Arrows ────────────────────────────────────────────────────────── -->

  <!-- ① LP → Pool: deposit X + Y -->
  <path d="M 185,80 L 260,80 L 260,210 L 330,210"
        fill="none" stroke="#4C6A91" stroke-width="1.8"
        marker-end="url(#ah-blue)"/>
  <text x="252" y="73"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#4C6A91" text-anchor="middle">deposit X + Y</text>

  <!-- ② Pool → LP: LP shares minted (dashed return) -->
  <path d="M 330,235 L 280,235 L 280,105 L 185,105"
        fill="none" stroke="#4C6A91" stroke-width="1.8"
        stroke-dasharray="6 3" marker-end="url(#ah-blue)"/>
  <text x="266" y="178"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#4C6A91" text-anchor="end">LP shares minted</text>

  <!-- ③ Trader → Pool: amount_in -->
  <path d="M 185,265 L 260,265 L 260,278 L 330,278"
        fill="none" stroke="#4C6A91" stroke-width="1.8"
        marker-end="url(#ah-blue)"/>
  <text x="255" y="258"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#4C6A91" text-anchor="middle">amount_in</text>

  <!-- ④ Pool → Trader: amount_out ≥ min_out (dashed return) -->
  <path d="M 330,295 L 295,295 L 295,280 L 185,280"
        fill="none" stroke="#4C6A91" stroke-width="1.8"
        stroke-dasharray="6 3" marker-end="url(#ah-blue)"/>
  <text x="237" y="310"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#4C6A91" text-anchor="middle">amount_out (≥ min_out)</text>

  <!-- ⑤ External → Arbitrageur: external reference price
       Routes down the right margin (x=860), then left to Arbitrageur.
       Stays entirely on right side; never crosses AMM Pool. -->
  <path d="M 767,130 L 767,460 L 185,460"
        fill="none" stroke="#8E3B3B" stroke-width="1.8"
        stroke-dasharray="7 4" marker-end="url(#ah-red)"/>
  <text x="827" y="300"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#8E3B3B" text-anchor="middle"
        transform="rotate(90 827 300)">external reference price</text>

  <!-- ⑥ Arbitrageur → Pool: optimal trade (solid plum) -->
  <path d="M 185,450 L 260,450 L 260,330 L 330,330"
        fill="none" stroke="#8A6799" stroke-width="1.8"
        marker-end="url(#ah-plum)"/>
  <text x="255" y="442"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#8A6799" text-anchor="middle">optimal trade</text>

  <!-- ⑦ Pool → LP Position: withdraw · compare vs hold (solid blue) -->
  <path d="M 550,310 L 620,310 L 620,448 L 680,448"
        fill="none" stroke="#4C6A91" stroke-width="1.8"
        marker-end="url(#ah-blue)"/>
  <text x="590" y="302"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="11" fill="#4C6A91" text-anchor="middle">withdraw · compare vs hold</text>

</svg>
